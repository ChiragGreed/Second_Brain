<!DOCTYPE html>
<html>

<body>

    <div id="authView" class="auth-card">

        <h2>Second Brain</h2>

        <input id="username" placeholder="username" />

        <input id="password" type="password" placeholder="password" />

        <button id="loginBtn">
            Sign in
        </button>

        <p id="message"></p>

    </div>



    <div id="saveView" style="display:none" class="save-card">

        <h3>Save knowledge</h3>

        <input id="title" placeholder="Title" />

        <textarea id="content" placeholder="Description / notes"></textarea>

        <input id="url" placeholder="https://..." />

        <button id="saveBtn">
            Save
        </button>

        <p id="saveMessage"></p>

    </div>


    <script type="module" src="popup.js"></script>

</body>

</html>
